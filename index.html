<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <link rel="shortcut icon" href="favicon.ico" type="image/x-icon">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism-tomorrow.min.css" rel="stylesheet" />
    <link href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/plugins/toolbar/prism-toolbar.min.css" rel="stylesheet" />
    
    <!-- KaTeX CSS e JS (Necessários para renderizar fórmulas) -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.css">
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/contrib/auto-render.min.js"></script>

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/prism.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/plugins/toolbar/prism-toolbar.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/plugins/copy-to-clipboard/prism-copy-to-clipboard.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-python.min.js"></script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BlazerIA - Memória Ativa</title>
    <style>
        :root {
            --bg-dark: #0f172a;
            --bg-card: #1e293b;
            --accent: #3b82f6;
            --text: #f8fafc;
            --text-dim: #94a3b8;
            --border: #334155;
            --terminal-green: #22c55e; /* Cor clássica de terminal */
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background: var(--bg-dark); color: var(--text); display: flex; height: 100vh; overflow: hidden; transition: 0.2s; }

        /* --- ESTILOS DO MODO TERMINAL (NOVO) --- */
        body.terminal-mode {
            background: #000 !important;
            font-family: 'Courier New', Courier, monospace !important;
        }
        body.terminal-mode * { font-family: 'Courier New', Courier, monospace !important; }
        body.terminal-mode .msg { 
            background: transparent !important; 
            border: none !important; 
            color: var(--terminal-green) !important;
            padding: 5px 0 !important;
            max-width: 100% !important;
        }
        body.terminal-mode .user-msg::before { content: "usuário: "; font-weight: bold; color: #fff; }
        body.terminal-mode .bot-msg::before { content: "IA: "; font-weight: bold; color: var(--accent); }
        body.terminal-mode header, body.terminal-mode footer, body.terminal-mode #sidebar {
            background: #000 !important;
            border-color: #333 !important;
        }
        /* --------------------------------------- */

        #sidebar {
            width: 280px; background: var(--bg-card); border-right: 1px solid var(--border);
            display: flex; flex-direction: column; transition: 0.3s;
            position: fixed; height: 100%; z-index: 100; transform: translateX(-100%);
        }
        #sidebar.active { transform: translateX(0); }
        .sidebar-header { padding: 20px; border-bottom: 1px solid var(--border); }
        .new-chat-btn {
            background: var(--accent); color: white; border: none; padding: 12px;
            border-radius: 8px; width: 100%; font-weight: bold; cursor: pointer; margin-bottom: 10px;
        }
        
        /* Botão do Modo Terminal na Sidebar (NOVO) */
        .terminal-toggle-btn {
            background: #334155; color: #cbd5e1; border: 1px solid var(--border);
            padding: 8px; border-radius: 6px; width: 100%; cursor: pointer; font-size: 0.8rem;
        }

        #chat-list { flex: 1; overflow-y: auto; padding: 10px; }
        .chat-item {
            padding: 12px; border-radius: 8px; margin-bottom: 5px; cursor: pointer;
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis; font-size: 0.9rem; color: var(--text-dim);
        }
        .chat-item.active { background: var(--border); border-left: 4px solid var(--accent); color: var(--text); }

        #main { flex: 1; display: flex; flex-direction: column; width: 100%; }
        header {
            padding: 12px 15px; background: var(--bg-card); display: flex;
            align-items: center; justify-content: space-between; border-bottom: 1px solid var(--border);
        }
        .header-left { display: flex; align-items: center; gap: 15px; }
        .menu-btn { background: none; border: none; color: white; font-size: 1.5rem; cursor: pointer; }

        #model-select {
            background: var(--bg-dark); color: white; border: 1px solid var(--border);
            padding: 8px; border-radius: 8px; font-size: 0.85rem; outline: none;
            max-width: 200px;
        }

        #chat-container { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; }
        .msg { max-width: 90%; padding: 12px 16px; border-radius: 12px; line-height: 1.5; font-size: 0.95rem; white-space: pre-wrap; word-wrap: break-word; }
        .user-msg { align-self: flex-end; background: var(--accent); border-bottom-right-radius: 2px; }
        .bot-msg { align-self: flex-start; background: var(--bg-card); border: 1px solid var(--border); width: 100%; }

        footer { padding: 15px; background: var(--bg-card); border-top: 1px solid var(--border); display: flex; flex-direction: column; gap: 10px; }
        .input-row { display: flex; gap: 10px; align-items: flex-end; }
        
        .attach-btn {
            background: var(--bg-dark); border: 1px solid var(--border); color: var(--text-dim);
            width: 45px; height: 45px; border-radius: 12px; display: flex; align-items: center; 
            justify-content: center; cursor: pointer; font-size: 1.2rem; flex-shrink: 0;
        }

        textarea {
            flex: 1; background: var(--bg-dark); color: white; border: 1px solid var(--border);
            border-radius: 12px; padding: 12px; resize: none; outline: none; min-height: 45px; max-height: 120px;
        }
        .send-btn { background: var(--accent); width: 45px; height: 45px; border-radius: 12px; border: none; color: white; cursor: pointer; flex-shrink: 0; font-size: 1.2rem;}
        
        #file-preview { font-size: 0.8rem; color: var(--accent); display: none; padding-left: 5px; }
        .overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 90; }

        @media (min-width: 768px) { #sidebar { position: static; transform: none; } .menu-btn { display: none; } }
    </style>
</head>
<body>

<div id="overlay" class="overlay" onclick="toggleMenu(false)"></div>
<div id="sidebar">
    <div class="sidebar-header">
        <button class="new-chat-btn" onclick="createNewChat()">+ Novo Estudo</button>
        <button class="terminal-toggle-btn" onclick="toggleTerminalMode()">>_ Modo Terminal</button>
        <div style="padding: 0 20px 10px 20px;">
            <a href="blazeria.apk" download="BlazerIA.apk" style="background: #22c55e; color: white; text-decoration: none; padding: 10px; border-radius: 8px; width: 100%; display: block; text-align: center; font-weight: bold; font-size: 0.85rem; border: 1px solid #16a34a;">
                📥 Baixar Aplicativo (APK)
            </a>
        </div>
    </div>
    <div id="chat-list"></div>
</div>

<div id="main">
    <header>
        <div class="header-left">
            <button class="menu-btn" onclick="toggleMenu(true)">☰</button>
            <span id="chat-title">BlazerIA</span>
        </div>
        <select id="model-select">
            <option value="nvidia/nemotron-3-nano-omni-30b-a3b-reasoning:free">Nemotron 3 Omni (Foto/Vídeo/Áudio/Texto)</option>
            <option value="openai/gpt-oss-120b:free">gpt-oss-120b (Texto)</option>
            <option value="nvidia/nemotron-3-super-120b-a12b:free">NVIDIA Nemotron 3 Super (Texto) (⚠️experimental)</option>
            <option value="google/gemma-4-31b-it:free">Gemma 4 31B (Texto/Foto/Vídeo)</option>
            <option value="openrouter/owl-alpha">Owl Alpha (Texto)</option>
            <option value="baidu/cobuddy:free">Qianfan: CoBuddy (Texto)</option>
            <option value="nvidia/nemotron-nano-12b-v2-vl:free">Nemotron Nano 12B 2 VL (Texto/Foto/Vídeo)</option>
            <option value="z-ai/glm-4.5-air:free">GLM 4.5 Air (Texto)</option>
            <option value="poolside/laguna-m.1:free">Poolside: Laguna M.1 (Texto) (programação)</option>
            <option value="inclusionai/ring-2.6-1t:free">Ring-2.6-1T (Texto)</option>
            <option value="openrouter/free">Modelo aleatório gratuito(Indefinido)</option>
        </select>
    </header>
    
    <div id="chat-container"></div>
    
    <footer>
        <div id="file-preview"></div>
        <div id="typing" style="display:none; color: var(--accent); font-size: 0.8rem;">Processando resposta...</div>
        
        <div class="input-row">
            <label for="file-input" class="attach-btn" title="Anexar Arquivo">📎</label>
            <input type="file" id="file-input" style="display: none;" accept="image/*,video/*,audio/*">
            <textarea id="user-input" placeholder="Digite algo ou anexe uma foto vídeo e etc" rows="1"></textarea>
            <button class="send-btn" id="send-btn" onclick="handleSend()">➔</button>
        </div>
    </footer>
</div>

<script>
    const WORKER_URL = "https://blazeria.davirediske.workers.dev";
    let chats = JSON.parse(localStorage.getItem('blazeria_chats')) || [];
    let currentId = null;

    function toggleTerminalMode() {
        document.body.classList.toggle('terminal-mode');
        const isTerminal = document.body.classList.contains('terminal-mode');
        localStorage.setItem('blazeria_terminal_mode', isTerminal);
    }

    if(localStorage.getItem('blazeria_terminal_mode') === 'true') {
        document.body.classList.add('terminal-mode');
    }

    function fileToBase64(file) {
        return new Promise((resolve, reject) => {
            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = () => resolve(reader.result);
            reader.onerror = error => reject(error);
        });
    }

    document.getElementById('file-input').addEventListener('change', function() {
        const preview = document.getElementById('file-preview');
        if (this.files.length > 0) {
            preview.style.display = 'block';
            preview.innerText = `[ANEXO]: ${this.files[0].name}`;
        } else {
            preview.style.display = 'none';
        }
    });

    function saveToStorage() {
        localStorage.setItem('blazeria_chats', JSON.stringify(chats));
    }

    function createNewChat() {
        const id = Date.now();
        chats.push({ id, title: "Novo Estudo", messages: [] });
        saveToStorage();
        switchChat(id);
        if (window.innerWidth < 768) toggleMenu(false);
    }

    function switchChat(id) {
        currentId = id;
        renderSidebar();
        renderMessages();
    }

    function renderSidebar() {
        const list = document.getElementById('chat-list');
        list.innerHTML = '';
        chats.slice().reverse().forEach(c => {
            const div = document.createElement('div');
            div.className = `chat-item ${c.id === currentId ? 'active' : ''}`;
            div.innerText = c.title;
            div.onclick = () => switchChat(c.id);
            list.appendChild(div);
        });
    }

    function renderMessages() {
        const container = document.getElementById('chat-container');
        container.innerHTML = '';
        const chat = chats.find(c => c.id === currentId);
        if(!chat) return;
        
        chat.messages.forEach(m => {
            const div = document.createElement('div');
            div.className = `msg ${m.role === 'user' ? 'user-msg' : 'bot-msg'}`;
            if (m.role === 'assistant') {
                div.innerHTML = marked.parse(m.content);
            } else {
                div.innerText = m.content;
            }
            container.appendChild(div);
        });

        // Aplicar Syntax Highlight (Prism) e Fórmulas (KaTeX)
        Prism.highlightAllUnder(container);
        if (typeof renderMathInElement === 'function') {
            renderMathInElement(container, {
                delimiters: [
                    {left: '$$', right: '$$', display: true},
                    {left: '$', right: '$', display: false},
                    {left: '\\(', right: '\\)', display: false},
                    {left: '\\[', right: '\\]', display: true}
                ],
                throwOnError : false
            });
        }
        container.scrollTop = container.scrollHeight;
    }

    async function handleSend() {
        const input = document.getElementById('user-input');
        const fileInput = document.getElementById('file-input');
        const modelSelect = document.getElementById('model-select');
        const text = input.value.trim();
        const file = fileInput.files[0];

        if (!text && !file) return;

        const chat = chats.find(c => c.id === currentId);
        if (chat.messages.length === 0) chat.title = text ? text.substring(0, 20) : "Análise de Mídia";

        let displayContent = text;
        if (file) {
            displayContent = text ? `${text}\n\n[ANEXO: ${file.name}]` : `[ANEXO: ${file.name}]`;
        }

        chat.messages.push({ role: 'user', content: displayContent });
        input.value = '';
        fileInput.value = '';
        document.getElementById('file-preview').style.display = 'none';
        renderMessages();

        document.getElementById('typing').style.display = 'block';
        document.getElementById('send-btn').disabled = true;

        try {
            let apiContent = [];
            if (text) apiContent.push({ type: "text", text: text });
            if (file) {
                const base64 = await fileToBase64(file);
                const mimeType = file.type;
                if (mimeType.startsWith('image/')) {
                    apiContent.push({ type: "image_url", image_url: { url: base64 } });
                } else if (mimeType.startsWith('video/')) {
                    apiContent.push({ type: "video_url", video_url: { url: base64 } });
                } else if (mimeType.startsWith('audio/')) {
                    apiContent.push({ type: "input_audio", input_audio: { data: base64.split(',')[1], format: mimeType.split('/')[1] } });
                }
            }

            const memoriaCurta = chat.messages.slice(-30).map((msg, index, array) => {
                if (index === array.length - 1 && file) return { role: 'user', content: apiContent };
                return { role: msg.role, content: msg.content };
            });

            const res = await fetch(WORKER_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ model: modelSelect.value, messages: memoriaCurta })
            });

            const data = await res.json();
            chat.messages.push({ role: 'assistant', content: data.reply || data.error || "Erro desconhecido." });
            saveToStorage();
            renderMessages();
            renderSidebar();
        } catch (e) {
            chat.messages.push({ role: 'assistant', content: "[ERRO]: Falha na conexão com o mainframe." });
            renderMessages();
        } finally {
            document.getElementById('typing').style.display = 'none';
            document.getElementById('send-btn').disabled = false;
        }
    }

    function toggleMenu(show) {
        document.getElementById('sidebar').classList.toggle('active', show);
        document.getElementById('overlay').style.display = show ? 'block' : 'none';
    }

    document.getElementById('user-input').addEventListener('keydown', function(e) {
        if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); handleSend(); }
    });

    if (chats.length === 0) createNewChat();
    else switchChat(chats[chats.length - 1].id);
</script>
</body>
  </html>
