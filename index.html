    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BlazerIA - Memória Ativa</title>
    <style>
        :root {
            --bg-dark: #0f172a;
            --bg-card: #1e293b;
            --accent: #3b82f6;
            --text: #f8fafc;
            --text-dim: #94a3b8;
            --border: #334155;
            --terminal-green: #22c55e;
            --danger: #ef4444;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background: var(--bg-dark); color: var(--text); display: flex; height: 100vh; height: 100dvh; overflow: hidden; transition: 0.2s; }

        body.terminal-mode {
            background: #000 !important;
            font-family: 'Courier New', Courier, monospace !important;
        }
        body.terminal-mode * { font-family: 'Courier New', Courier, monospace !important; }
        body.terminal-mode .msg { 
            background: transparent !important; 
            border: none !important; 
            color: var(--terminal-green) !important;
            padding: 5px 0 !important;
            max-width: 100% !important;
        }
        body.terminal-mode .user-msg::before { content: "usuário: "; font-weight: bold; color: #fff; }
        body.terminal-mode .bot-msg::before { content: "IA: "; font-weight: bold; color: var(--accent); }
        body.terminal-mode header, body.terminal-mode footer, body.terminal-mode #sidebar {
            background: #000 !important;
            border-color: #333 !important;
        }

        #sidebar {
            width: 280px; background: var(--bg-card); border-right: 1px solid var(--border);
            display: flex; flex-direction: column; transition: 0.3s;
            position: fixed; height: 100%; z-index: 100; transform: translateX(-100%);
        }
        #sidebar.active { transform: translateX(0); }
        .sidebar-header { padding: 20px; border-bottom: 1px solid var(--border); }
        .new-chat-btn {
            background: var(--accent); color: white; border: none; padding: 12px;
            border-radius: 8px; width: 100%; font-weight: bold; cursor: pointer; margin-bottom: 10px;
        }
        
        .terminal-toggle-btn {
            background: #334155; color: #cbd5e1; border: 1px solid var(--border);
            padding: 8px; border-radius: 6px; width: 100%; cursor: pointer; font-size: 0.8rem;
        }

        #chat-list { flex: 1; overflow-y: auto; padding: 10px; }
        
        .chat-item {
            padding: 12px; border-radius: 8px; margin-bottom: 5px; cursor: pointer;
            font-size: 0.9rem; color: var(--text-dim);
            display: flex; align-items: center; justify-content: space-between; gap: 10px;
        }
        .chat-item:hover { background: rgba(255, 255, 255, 0.05); }
        .chat-item.active { background: var(--border); border-left: 4px solid var(--accent); color: var(--text); }
        
        .chat-title-text {
            flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        }
        .chat-delete-btn {
            background: none; border: none; cursor: pointer; font-size: 0.95rem;
            opacity: 0.4; transition: 0.2s; padding: 2px 4px; border-radius: 4px;
        }
        .chat-item:hover .chat-delete-btn { opacity: 0.8; }
        .chat-delete-btn:hover { opacity: 1 !important; background: rgba(239, 68, 68, 0.2); }

        #main { flex: 1; display: flex; flex-direction: column; width: 100%; overflow: hidden; }
        header {
            padding: 12px 15px; background: var(--bg-card); display: flex;
            align-items: center; justify-content: space-between; border-bottom: 1px solid var(--border);
        }
        .header-left { display: flex; align-items: center; gap: 15px; overflow: hidden; flex: 1; }
        .menu-btn { background: none; border: none; color: white; font-size: 1.5rem; cursor: pointer; }
        #chat-title { font-weight: bold; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 200px; }

        #model-select {
            background: var(--bg-dark); color: white; border: 1px solid var(--border);
            padding: 8px; border-radius: 8px; font-size: 0.85rem; outline: none;
            max-width: 200px;
        }

        #chat-container { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; }
        
        .msg { max-width: 90%; padding: 12px 16px; border-radius: 12px; line-height: 1.5; font-size: 0.95rem; overflow-wrap: break-word; }
        .user-msg { align-self: flex-end; background: var(--accent); border-bottom-right-radius: 2px; white-space: pre-wrap; }
        
        .bot-msg { align-self: flex-start; background: var(--bg-card); border: 1px solid var(--border); }
        
        .bot-msg pre, .bot-msg table { overflow-x: auto; max-width: 100%; }

        footer { padding: 15px; background: var(--bg-card); border-top: 1px solid var(--border); display: flex; flex-direction: column; gap: 10px; }
        .input-row { display: flex; gap: 10px; align-items: flex-end; }
        
        .attach-btn {
            background: var(--bg-dark); border: 1px solid var(--border); color: var(--text-dim);
            width: 45px; height: 45px; border-radius: 12px; display: flex; align-items: center; 
            justify-content: center; cursor: pointer; font-size: 1.2rem; flex-shrink: 0;
        }

        textarea {
            flex: 1; background: var(--bg-dark); color: white; border: 1px solid var(--border);
            border-radius: 12px; padding: 12px; resize: none; outline: none; min-height: 45px; max-height: 120px;
        }
        .send-btn { background: var(--accent); width: 45px; height: 45px; border-radius: 12px; border: none; color: white; cursor: pointer; flex-shrink: 0; font-size: 1.2rem;}
        
        #file-preview { font-size: 0.8rem; color: var(--accent); display: none; padding-left: 5px; }
        .overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 90; }

        @media (min-width: 768px) { #sidebar { position: static; transform: none; } .menu-btn { display: none; } }

        @media (max-width: 767px) {
            header {
                flex-wrap: wrap;
                gap: 8px;
                padding: 10px 12px;
            }
            .header-left {
                width: 100%;
                justify-content: space-between;
            }
            #model-select {
                max-width: 100% !important;
                flex: 1;
                font-size: 0.8rem;
                padding: 6px;
            }
            #fusion-power-select {
                max-width: 100% !important;
                flex: 1;
                margin-left: 0 !important;
                font-size: 0.8rem;
                padding: 6px;
            }
            #chat-container {
                padding: 12px;
                gap: 12px;
            }
            .msg {
                max-width: 95%;
                padding: 10px 14px;
                font-size: 0.92rem;
            }
            footer {
                padding: 10px;
            }
            .input-row {
                gap: 8px;
            }
            textarea {
                padding: 10px;
                border-radius: 10px;
                font-size: 0.95rem;
            }
            .attach-btn, .send-btn {
                width: 42px;
                height: 42px;
                border-radius: 10px;
            }
        }
    </style>
</head>

<script>
    const WORKER_URL = "https://blazeria.davirediske.workers.dev";
    let chats = JSON.parse(localStorage.getItem('blazeria_chats')) || [];
    let currentId = null;
    let turnstileToken = null;

    function onTurnstileSuccess(token) {
        turnstileToken = token;
    }

    function toggleApiKey() {
        let currentKeyIndex = localStorage.getItem('blazeria_api_index') || '0';
        let newIndex = currentKeyIndex === '0' ? '1' : '0';
        localStorage.setItem('blazeria_api_index', newIndex);
        
        const keyName = newIndex === '0' ? 'Principal' : 'Secundária';
        alert(`API Key OpenRouter alterada para a conta ${keyName}!\nAs próximas mensagens usarão a nova chave.`);
    }

    function toggleTerminalMode() {
        document.body.classList.toggle('terminal-mode');
        const isTerminal = document.body.classList.contains('terminal-mode');
        localStorage.setItem('blazeria_terminal_mode', isTerminal);
    }

    if(localStorage.getItem('blazeria_terminal_mode') === 'true') {
        document.body.classList.add('terminal-mode');
    }

    function fileToBase64(file) {
        return new Promise((resolve, reject) => {
            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = () => resolve(reader.result);
            reader.onerror = error => reject(error);
        });
    }

    document.getElementById('file-input').addEventListener('change', function() {
        const preview = document.getElementById('file-preview');
        if (this.files.length > 0) {
            preview.style.display = 'block';
            preview.innerText = `[ANEXO]: ${this.files[0].name}`;
        } else {
            preview.style.display = 'none';
        }
    });

    function saveToStorage() {
        localStorage.setItem('blazeria_chats', JSON.stringify(chats));
    }

    function createNewChat() {
        const id = Date.now();
        chats.push({ id, title: "Novo Estudo", messages: [] });
        saveToStorage();
        switchChat(id);
        if (window.innerWidth < 768) toggleMenu(false);
    }

    function switchChat(id) {
        currentId = id;
        const chat = chats.find(c => c.id === currentId);
        if (chat) {
            document.getElementById('chat-title').innerText = chat.title;
        }
        renderSidebar();
        renderMessages();
    }

    function deleteChat(id) {
        if (!confirm("Tem certeza de que deseja apagar permanentemente este chat?")) return;
        chats = chats.filter(c => c.id !== id);
        saveToStorage();
        
        if (chats.length === 0) {
            createNewChat();
        } else if (currentId === id) {
            switchChat(chats[chats.length - 1].id);
        } else {
            renderSidebar();
        }
    }

    function renderSidebar() {
        const list = document.getElementById('chat-list');
        list.innerHTML = '';
        chats.slice().reverse().forEach(c => {
            const div = document.createElement('div');
            div.className = `chat-item ${c.id === currentId ? 'active' : ''}`;
            
            const titleSpan = document.createElement('span');
            titleSpan.className = 'chat-title-text';
            titleSpan.innerText = c.title;
            titleSpan.onclick = () => {
                switchChat(c.id);
                if (window.innerWidth < 768) toggleMenu(false);
            };
            
            const deleteBtn = document.createElement('button');
            deleteBtn.className = 'chat-delete-btn';
            deleteBtn.innerHTML = '🗑️';
            deleteBtn.title = 'Apagar Chat';
            deleteBtn.onclick = (e) => {
                e.stopPropagation();
                deleteChat(c.id);
            };
            
            div.appendChild(titleSpan);
            div.appendChild(deleteBtn);
            list.appendChild(div);
        });
    }

    function renderMessages() {
        const container = document.getElementById('chat-container');
        container.innerHTML = '';
        const chat = chats.find(c => c.id === currentId);
        if(!chat) return;
        
        chat.messages.forEach(m => {
            const div = document.createElement('div');
            div.className = `msg ${m.role === 'user' ? 'user-msg' : 'bot-msg'}`;
            
            if (m.role === 'assistant') {
                let textoProtegido = m.content;
                
                const safeRegex = new RegExp('\\x60{3}(?:math|latex|tex|katex)\\n?([\\s\\S]*?)\\x60{3}', 'gi');
                textoProtegido = textoProtegido.replace(safeRegex, '$1');

                const mathBlocks = [];
                
                textoProtegido = textoProtegido.replace(/\\\[([\s\S]*?)\\\]/g, (match, math) => {
                    mathBlocks.push({ text: math, display: true });
                    return `MATHBLOCKXYZ${mathBlocks.length - 1}XYZ`;
                });
                
                textoProtegido = textoProtegido.replace(/\$$([\s\S]*?)\$\$/g, (match, math) => {
                    mathBlocks.push({ text: math, display: true });
                    return `MATHBLOCKXYZ${mathBlocks.length - 1}XYZ`;
                });
                
                textoProtegido = textoProtegido.replace(/\\\(([\s\S]*?)\\\)/g, (match, math) => {
                    mathBlocks.push({ text: math, display: false });
                    return `MATHBLOCKXYZ${mathBlocks.length - 1}XYZ`;
                });
                
                textoProtegido = textoProtegido.replace(/\$([^\$\n\t]+?)\$/g, (match, math) => {
                    mathBlocks.push({ text: math, display: false });
                    return `MATHBLOCKXYZ${mathBlocks.length - 1}XYZ`;
                });

                let htmlFormatado = marked.parse(textoProtegido);

                mathBlocks.forEach((block, index) => {
                    try {
                        const renderedMath = katex.renderToString(block.text, {
                            displayMode: block.display,
                            throwOnError: false
                        });
                        htmlFormatado = htmlFormatado.replace(`MATHBLOCKXYZ${index}XYZ`, renderedMath);
                    } catch (e) {
                        const delimiter = block.display ? '$$' : '$';
                        htmlFormatado = htmlFormatado.replace(`MATHBLOCKXYZ${index}XYZ`, `${delimiter}${block.text}${delimiter}`);
                    }
                });

                div.innerHTML = htmlFormatado;

                if (m.modelUsed) {
                    const badge = document.createElement('div');
                    badge.style.cssText = "font-size:0.75rem; color:var(--text-dim); margin-top:8px; border-top:1px solid var(--border); padding-top:5px; text-align:right;";
                    badge.innerText = `⚡ Respondido por: ${m.modelUsed}`;
                    div.appendChild(badge);
                }
            } else {
                div.innerText = m.content;
            }
            container.appendChild(div);
        });

        if (window.Prism) Prism.highlightAllUnder(container);
        
        if (window.renderMathInElement) {
            renderMathInElement(container, {
                delimiters: [
                    {left: '$$', right: '$$', display: true},
                    {left: '$', right: '$', display: false},
                    {left: '\\(', right: '\\)', display: false},
                    {left: '\\[', right: '\\]', display: true}
                ],
                ignoredTags: ["script", "noscript", "style", "textarea", "option"],
                throwOnError : false
            });
        }
        container.scrollTop = container.scrollHeight;
    }

    async function handleSend() {
        const input = document.getElementById('user-input');
        const fileInput = document.getElementById('file-input');
        const modelSelect = document.getElementById('model-select');
        
        const text = input.value.trim();
        const file = fileInput.files[0];

        if (!text && !file) return;

        if (!turnstileToken && window.turnstile) {
            turnstileToken = turnstile.getResponse();
        }

        if (!turnstileToken && window.turnstile) {
            const typingIndicator = document.getElementById('typing');
            typingIndicator.innerText = "Aguardando verificação de segurança da Cloudflare...";
            typingIndicator.style.display = 'block';
            
            for (let i = 0; i < 10; i++) {
                await new Promise(resolve => setTimeout(resolve, 200));
                turnstileToken = turnstile.getResponse();
                if (turnstileToken) break;
            }
        }

        if (!turnstileToken) {
            alert("A verificação de segurança ainda não foi concluída. Por favor, aguarde um instante e tente novamente.");
            document.getElementById('typing').style.display = 'none';
            return;
        }

        const chat = chats.find(c => c.id === currentId);
        if (chat.messages.length === 0) {
            chat.title = text ? text.substring(0, 20) : "Análise de Mídia";
            document.getElementById('chat-title').innerText = chat.title;
        }

        let displayContent = text || `[ANEXO: ${file.name}]`;
        if (file && text) displayContent = `${text}\n\n[ANEXO: ${file.name}]`;

        chat.messages.push({ role: 'user', content: displayContent });
        input.value = '';
        fileInput.value = '';
        document.getElementById('file-preview').style.display = 'none';
        renderMessages();

        const typingIndicator = document.getElementById('typing');
        if (modelSelect.value === "fusion" || modelSelect.value === "nvidia-fusion") {
            typingIndicator.innerText = "🌀 Orquestrando comitê de IAs na Fila...";
        } else {
            typingIndicator.innerText = "Processando resposta...";
        }
        typingIndicator.style.display = 'block';
        document.getElementById('send-btn').disabled = true;

        try {
            let apiContent = [];
            if (text) apiContent.push({ type: "text", text: text });
            
            if (file) {
                const base64 = await fileToBase64(file);
                const mimeType = file.type;
                if (mimeType.startsWith('image/')) apiContent.push({ type: "image_url", image_url: { url: base64 } });
            }

            const memoriaCurta = chat.messages.slice(-30).map((msg, index, array) => {
                if (index === array.length - 1 && file) return { role: 'user', content: apiContent };
                return { role: msg.role, content: msg.content };
            });

            let modelToUse = modelSelect.value;
            let fusionPower = null;

            if (modelToUse === "fusion") {
                fusionPower = document.getElementById('fusion-power-select').value || 'medium';
                
                const nivelsFusion = {
                    "low": ["google/gemma-4-31b-it:free", "poolside/laguna-xs.2:free", "nvidia/nemotron-3-nano-omni-30b-a3b-reasoning:free"],
                    "medium": ["poolside/laguna-m.1:free", "z-ai/glm-4.5-air:free", "google/gemma-4-31b-it:free"],
                    "high": ["openai/gpt-oss-120b:free", "z-ai/glm-4.5-air:free", "nvidia/nemotron-3-super-120b-a12b:free"]
                };
                
                modelToUse = nivelsFusion[fusionPower] || nivelsFusion["medium"];
            }

            const payload = {
            model: modelSelect.value, // Mantém a string pura ('fusion' ou 'nvidia-fusion') para o Worker decidir
            messages: memoriaCurta,
            turnstileToken: turnstileToken,
            apiIndex: localStorage.getItem('blazeria_api_index') || '0'
        };

        if (modelSelect.value === "nvidia-fusion") {
            payload.model = "nvidia-fusion";
        } else if (fusionPower) {
            payload.fusionPower = fusionPower;
        }

            const res = await fetch(WORKER_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });

            if (!res.ok) {
                const errData = await res.json().catch(() => ({}));
                throw new Error(errData.error || `Erro HTTP ${res.status}`);
            }

            const data = await res.json();
            
            // ========================================================
            // MECANISMO DE FILA INTELIGENTE (STATUS EM TEMPO REAL)
            // ========================================================
            if (data.status === "queued") {
                const jobId = data.jobId;
                let tentativasFalhasSeguidas = 0;
                
                const checkInterval = setInterval(async () => {
                    try {
                        const checkRes = await fetch(`${WORKER_URL}/check-job?jobId=${jobId}`);
                        
                        if (!checkRes.ok) {
                            tentativasFalhasSeguidas++;
                            if (tentativasFalhasSeguidas >= 5) {
                                throw new Error(`Falhas consecutivas de rede ao contatar a fila (${checkRes.status}).`);
                            }
                            return;
                        }

                        tentativasFalhasSeguidas = 0;
                        const checkData = await checkRes.json();

                        // Atualiza a tela com o passo que o Worker está rodando lá na nuvem!
                        if (checkData.status === "processing") {
                            const passoAtual = checkData.step || "Processando comitê de IAs na Fila...";
                            typingIndicator.innerText = `🌀 Modo Fusion: ${passoAtual}`;
                        }

                        if (checkData.status === "completed") {
                            clearInterval(checkInterval);
                            
                            if (window.turnstile) {
                                turnstile.reset();
                                turnstileToken = null;
                            }

                            if (checkData.error) {
                                chat.messages.push({ role: 'assistant', content: "⚠️ **Erro Crítico no Comitê de IA:**\n\n" + checkData.error });
                            } else {
                                chat.messages.push({ role: 'assistant', content: checkData.reply, modelUsed: checkData.modelUsed });
                            }
                            
                            saveToStorage();
                            renderMessages();
                            renderSidebar();
                            
                            document.getElementById('typing').style.display = 'none';
                            document.getElementById('send-btn').disabled = false;
                        }
                    } catch (e) {
                        clearInterval(checkInterval);
                        chat.messages.push({ 
                            role: 'assistant', 
                            content: `⚠️ **Perda de conexão com a fila de processamento.**\n\n*Detalhes técnicos:* ${e.message}` 
                        });
                        renderMessages();
                        
                        document.getElementById('typing').style.display = 'none';
                        document.getElementById('send-btn').disabled = false;
                    }
                }, 2500); // Fica de olho no KV a cada 2.5s
                
                return;
            }

            // MODO NORMAL (SÍNCRONO)
            if (window.turnstile) {
                turnstile.reset();
                turnstileToken = null;
            }

            if (data.error) {
                chat.messages.push({ role: 'assistant', content: `[SEGURANÇA/ERRO]: ${data.error}` });
            } else {
                chat.messages.push({ role: 'assistant', content: data.reply, modelUsed: data.modelUsed });
            }
            
            saveToStorage();
            renderMessages();
            renderSidebar();
            
            document.getElementById('typing').style.display = 'none';
            document.getElementById('send-btn').disabled = false;

        } catch (e) {
            chat.messages.push({ role: 'assistant', content: `[ERRO CRÍTICO]: Falha na comunicação com o servidor protegido.\nMotivo: ${e.message}` });
            renderMessages();
            
            document.getElementById('typing').style.display = 'none';
            document.getElementById('send-btn').disabled = false;
        }
    }

    function toggleMenu(show) {
        document.getElementById('sidebar').classList.toggle('active', show);
        document.getElementById('overlay').style.display = show ? 'block' : 'none';
    }

    document.getElementById('user-input').addEventListener('keydown', function(e) {
        if (e.key === 'Enter' && !e.shiftKey) {
            e.preventDefault();
            handleSend();
        }
    });

    function updateFusionPowerVisibility() {
        const modelSelect = document.getElementById('model-select');
        const fusionPowerSelect = document.getElementById('fusion-power-select');
        
        if (modelSelect.value === 'fusion') {
            fusionPowerSelect.style.display = 'block';
        } else {
            fusionPowerSelect.style.display = 'none';
        }
    }

    document.getElementById('model-select').addEventListener('change', updateFusionPowerVisibility);
    updateFusionPowerVisibility();

    if (chats.length === 0) createNewChat();
    else switchChat(chats[chats.length - 1].id);
</script>
</body>
</html>
